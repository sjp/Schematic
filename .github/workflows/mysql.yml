name: mysql

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  db:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [8, 9, latest]
    services:
      mysql:
        image: mysql:${{ matrix.tag }}
        env:
          MYSQL_ROOT_PASSWORD: Schematic1234
          MYSQL_DATABASE: schematic
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Install dependencies
      run: dotnet restore
      working-directory: src/SJP.Schematic.MySql.Tests

    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: src/SJP.Schematic.MySql.Tests

    - name: Test
      run: dotnet test --no-restore --verbosity normal -- --coverage --coverage-settings ${{ github.workspace }}/src/coverage.settings.xml --coverage-output-format cobertura --coverage-output coverage.cobertura.xml
      working-directory: src/SJP.Schematic.MySql.Tests
      env:
        ConnectionStrings__MySql_TestDb: Server=localhost; Port=3306; Database=schematic; Uid=root; Pwd=Schematic1234; ConnectionTimeout=2

    - name: Coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
