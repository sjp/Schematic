version: 2
updates:
- package-ecosystem: nuget
  directory: "/src"
  schedule:
    interval: weekly
  open-pull-requests-limit: 50
  groups:
    nuget:
      patterns:
        - "*"
- package-ecosystem: npm
  directory: "/src/SJP.Schematic.Reporting/ui"
  schedule:
    interval: weekly
  open-pull-requests-limit: 50
  groups:
    npm:
      patterns:
        - "*"
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"